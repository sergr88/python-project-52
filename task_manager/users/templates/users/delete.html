{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Delete user" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h1 class="my-4">{% trans "Delete user" %}</h1>
    <p>{% trans "Are you sure you want to delete" %} {{ object.username }}?</p>
    <form method="post">
      {% csrf_token %}
      <input type="submit" class="btn btn-danger" value="{% trans 'Yes, delete' %}">
    </form>
  </div>
</div>
{% endblock %}
